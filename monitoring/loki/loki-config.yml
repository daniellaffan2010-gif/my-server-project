auth_enabled: false

ingester:
  chunk_idle_period: 3m
  max_chunk_age: 1h
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2020-10-24
      store: inmemory
      schema: v11

server:
  http_listen_port: 3100
  log_level: info

storage_config:
  index_cache_validity: 5m
  cache_config:
    enable_fifocache: true
    fifocache:
      max_size_items: 1024
