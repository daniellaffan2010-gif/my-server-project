version: "3.9"

services:

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build: ./src/api
    container_name: infra_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://infra_user:infra_pass@db:5432/infra_db
      REDIS_URL: redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - infra_net
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: infra_db
    environment:
      POSTGRES_USER: infra_user
      POSTGRES_PASSWORD: infra_pass
      POSTGRES_DB: infra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infra_user -d infra_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_net
    restart: unless-stopped

  # ── Redis Cache / Queue ─────────────────────────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: infra_cache
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infra_net
    restart: unless-stopped

  # ── Worker Service ──────────────────────────────────────────────────────────
  worker:
    build: ./src/worker
    container_name: infra_worker
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://infra_user:infra_pass@db:5432/infra_db
      REDIS_URL: redis://cache:6379/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - infra_net
    restart: unless-stopped

  # ── Postgres Exporter ───────────────────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: infra_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://infra_user:infra_pass@db:5432/infra_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - infra_net
    restart: unless-stopped

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: infra_redis_exporter
    environment:
      REDIS_ADDR: redis://cache:6379
    depends_on:
      cache:
        condition: service_healthy
    networks:
      - infra_net
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: infra_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - api
      - worker
      - postgres_exporter
      - redis_exporter
    networks:
      - infra_net
    restart: unless-stopped

  # ── Loki (Log Aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: infra_loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - infra_net
    restart: unless-stopped

  # ── Promtail (Log Scraper for Loki) ─────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    container_name: infra_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - infra_net
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: infra_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - infra_net
    restart: unless-stopped

# ── Shared network ──────────────────────────────────────────────────────────
networks:
  infra_net:
    driver: bridge

# ── Named volumes (data survives container restarts) ────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
